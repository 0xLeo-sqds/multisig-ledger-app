[target.nanosplus]
runner = "speculos -m nanosp"

[target.nanox]
runner = "speculos -m nanox"

[target.stax]
runner = "speculos -m stax"

[target.flex]
runner = "speculos -m flex"

[target.apex_p]
runner = "speculos -m apex_p"

[build]
target = "nanosplus"

[profile.release]
opt-level = 'z'
lto = true

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]
