name: Build and run functional tests

# Mandatory for Ledger device app submission: build every target from
# ledger_app.toml, then run Speculos/Ragger standalone tests.
on:
  workflow_dispatch:
    inputs:
      golden_run:
        type: choice
        required: true
        default: "Raise an error (default)"
        description: CI behavior if test snapshots differ from expected output.
        options:
          - "Raise an error (default)"
          - "Open a PR"
  push:
    branches:
      - master
      - main
      - develop
  pull_request:

jobs:
  build_application:
    name: Build application using the reusable workflow
    uses: LedgerHQ/ledger-app-workflows/.github/workflows/reusable_build.yml@v1.95.7
    with:
      upload_app_binaries_artifact: "app_squads_binaries"

  tests_standalone:
    name: Run standalone Ragger tests using the reusable workflow
    needs: build_application
    uses: LedgerHQ/ledger-app-workflows/.github/workflows/reusable_ragger_tests.yml@v1.95.7
    with:
      download_app_binaries_artifact: "app_squads_binaries"
      regenerate_snapshots: ${{ github.event_name == 'workflow_dispatch' && inputs.golden_run == 'Open a PR' }}
      test_dir: "tests/standalone"
