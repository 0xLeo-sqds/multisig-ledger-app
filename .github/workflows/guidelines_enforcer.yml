# Mandatory for Ledger device app submission.
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:

permissions:
  contents: read
  actions: write

jobs:
  guidelines_enforcer:
    name: Call Ledger guidelines_enforcer
    uses: LedgerHQ/ledger-app-workflows/.github/workflows/reusable_guidelines_enforcer.yml@v1.95.7
