name: Run native Rust parser tests

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:

jobs:
  native_tests:
    name: cargo test native parser suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Run native tests
        working-directory: tests/native
        run: cargo -Z build-std= test --locked --target x86_64-unknown-linux-gnu
